# Default configuration for DDPM training on CIFAR-10

# Data configuration
data:
  dataset: "cifar10"
  image_size: 32
  batch_size: 128
  num_workers: 4
  normalize_to: "[-1, 1]"

# Model architecture
model:
  model_type: "unet"
  in_channels: 3
  out_channels: 3
  model_channels: 128
  channel_mult: [1, 2, 2, 2]
  num_res_blocks: 2
  attention_resolutions: [16]
  num_heads: 4
  num_head_channels: -1

# Diffusion process
diffusion:
  num_timesteps: 1000
  beta_schedule: "linear"
  beta_start: 0.0001
  beta_end: 0.02
  clip_denoised: true
  predict_noise: true

# Training configuration
training:
  num_epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.0
  ema_decay: 0.9999
  use_ema: false
  gradient_clip: 1.0
  save_interval: 10
  sample_interval: 5
  num_sample_batches: 4
  device: "auto"
  seed: 42
  resume_checkpoint: null

# Sampling configuration
sampling:
  num_samples: 64
  checkpoint_path: "results/checkpoints/best.pt"
  save_gif: true
  num_gif_steps: 50
  device: "auto"
  seed: 42

# Output directories
results_dir: "results"
checkpoint_dir: "results/checkpoints"
sample_dir: "results/samples"
plot_dir: "results/plots"
